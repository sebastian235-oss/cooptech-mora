name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Ensure demo model artifacts
        run: |
          if [ ! -f modelo_mora_produccion/modelo_mora.pkl ]; then
            python3 modelo_mora_produccion/train_demo_model.py
          fi
      - name: Smoke test API
        run: |
          cd backend
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/api/health
          curl -sf http://127.0.0.1:8000/api/socios/dashboard | head -c 200

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build
