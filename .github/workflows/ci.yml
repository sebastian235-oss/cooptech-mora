name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Verify production model loads
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'backend')
          from app.ml import production_scorer
          assert production_scorer.production_available(), production_scorer.production_error()
          print('OK modelo_mora_futura.pkl')
          "
      - name: Verify routers import
        run: PYTHONPATH=backend python3 -c "from app.routers import upload; assert upload.router"
      - name: Test tabla maestra import
        run: |
          cd backend
          PYTHONPATH=. python3 -c "
          from pathlib import Path
          from app.services.excel_import import import_excel
          p = Path('../samples/tabla_maestra_mora_test.xlsx')
          r = import_excel(p.read_bytes(), p.name)
          assert r['total'] == 50
          assert r['modo_ranking'] == 'tabla_maestra_relativo'
          probs = [s['prediccion']['probabilidad_mora'] for s in r['socios']]
          assert max(probs) > 0.1, probs[:5]
          print('OK tabla maestra', r['modo_ranking'], round(max(probs), 3))
          "
      - name: Smoke test API
        run: |
          cd backend
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 4
          curl -sf http://127.0.0.1:8000/api/health
          curl -sf http://127.0.0.1:8000/api/socios/dashboard | head -c 200

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build
