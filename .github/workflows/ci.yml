name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Verify production model loads
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'backend')
          from app.ml import production_scorer
          assert production_scorer.production_available(), production_scorer.production_error()
          print('OK modelo_mora_futura.pkl')
          "
      - name: Smoke test API
        run: |
          cd backend
          PYTHONPATH=. uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 4
          curl -sf http://127.0.0.1:8000/api/health
          curl -sf http://127.0.0.1:8000/api/socios/dashboard | head -c 200

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build
